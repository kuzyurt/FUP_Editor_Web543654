<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPLC FBD Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'panel-bg': '#252526',
                        'bg-dark': '#1e1e1e',
                        'accent': '#007acc',
                        'border-col': '#3e3e42',
                        'text-col': '#cccccc',
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar to match original look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        body {
            user-select: none;
            overflow: hidden;
        }

        /* Skeuomorphic Animations & Keyframes */
        @keyframes floatObj { from {transform: translateY(0);} to {transform: translateY(3px);} }
        .animate-float { animation: floatObj 1s infinite alternate; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }
        .animate-shake { animation: shake 0.3s; }
    </style>
